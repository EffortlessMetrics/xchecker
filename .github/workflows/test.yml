# Test Workflow - Consolidated CI pipeline
#
# This workflow is the single source of truth for all testing and validation:
# - lint: Format and clippy checks on every push/PR
# - test-fast: Quick unit tests on every PR (~30s)
# - test-full: Comprehensive tests on main branch and nightly
# - schema-validation: JSON schema compliance checks
# - secret-scanning: Secret detection tests
# - docs-conformance: Documentation validation
# - gate-validation: Gate command tests (cross-platform)
# - test-real: Real Claude API smoke tests (main branch only)
#
# Schedule runs are limited to ubuntu-latest to conserve runner minutes.
# Use workflow_dispatch with platform=all to run on all 3 platforms manually.
#
# See docs/TESTING.md for test lane documentation.

name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Run weekly on Monday at 2:00 AM UTC (was daily; reduced to save minutes)
    - cron: '0 2 * * 1'
  workflow_dispatch:
    inputs:
      test_lane:
        description: 'Test lane to run'
        required: true
        default: 'fast'
        type: choice
        options:
          - fast
          - full
      platform:
        description: 'Platform(s) to run on'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - ubuntu-only

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ============================================================================
  # LINT: Format and clippy checks
  # ============================================================================
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  # ============================================================================
  # TEST-FAST: Quick feedback on every PR (~30s)
  # ============================================================================
  test-fast:
    name: Test Fast (${{ matrix.os }})
    if: github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && inputs.test_lane == 'fast')
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Run test-fast (lib + bins)
        run: cargo test --lib --bins --locked

  # ============================================================================
  # TEST-FULL: Comprehensive testing (nightly + main branch)
  # ============================================================================
  test-full:
    name: Test Full (${{ matrix.os }})
    if: |
      github.event_name == 'push' ||
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' && inputs.test_lane == 'full')
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        # Schedule runs use ubuntu-only to save runner minutes.
        # Push runs and manual 'all' dispatches use all 3 platforms.
        os: ${{ (github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.platform == 'ubuntu-only')) && fromJSON('["ubuntu-latest"]') || fromJSON('["ubuntu-latest","macos-latest","windows-latest"]') }}
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-full-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-full-
            ${{ runner.os }}-cargo-

      - name: Run test-full (all tests) - Locked
        run: cargo test --all-features --locked
        env:
          PROPTEST_CASES: 128

      - name: Run doc tests
        run: cargo test --doc

  # ============================================================================
  # FRESH RESOLVE: Catches dependency drift (weekly schedule only)
  # ============================================================================
  # Separated from test-full so push builds are not doubled.
  # Runs as part of the weekly schedule and on manual 'full' dispatches.
  fresh-resolve:
    name: Fresh Resolve (ubuntu)
    if: |
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' && inputs.test_lane == 'full')
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ubuntu-cargo-fresh-${{ hashFiles('**/Cargo.toml') }}
          restore-keys: |
            ubuntu-cargo-fresh-
            ubuntu-cargo-

      - name: Fresh resolve and test
        shell: bash
        run: |
          set -euo pipefail
          if command -v ld.lld >/dev/null 2>&1 || command -v lld >/dev/null 2>&1; then
            if [ -n "${RUSTFLAGS:-}" ]; then
              export RUSTFLAGS="$RUSTFLAGS -C link-arg=-fuse-ld=lld"
            else
              export RUSTFLAGS="-C link-arg=-fuse-ld=lld"
            fi
          fi
          export CARGO_PROFILE_TEST_DEBUG=0
          export CARGO_PROFILE_DEV_DEBUG=0
          export CARGO_BUILD_JOBS=1
          export CARGO_INCREMENTAL=0

          cargo update
          cargo test --all-features
        env:
          PROPTEST_CASES: 128

  # ============================================================================
  # PROPERTY TESTS: Dedicated property-based testing job
  # ============================================================================
  property-tests:
    name: Property Tests
    if: |
      github.event_name == 'push' ||
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' && inputs.test_lane == 'full')
    timeout-minutes: 20
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ubuntu-cargo-pbt-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ubuntu-cargo-pbt-
            ubuntu-cargo-

      - name: Run property-based tests
        run: cargo test --test property_based_tests
        env:
          # Use higher case count for CI
          PROPTEST_CASES: 256

      - name: Run doctor HTTP provider property tests
        run: cargo test --test test_doctor_http_provider_checks
        env:
          PROPTEST_CASES: 128

  # ============================================================================
  # STUB TESTS: Integration tests with claude-stub
  # ============================================================================
  # NOTE: This job runs on PRs for visibility but is NOT required in branch protection.
  # It provides early signal for stub-dependent issues without blocking merges.
  # Plan: After 3 consecutive stable weeks, consider making this required.
  stub-tests:
    name: Stub Integration Tests (non-blocking)
    if: |
      github.event_name == 'pull_request' ||
      github.event_name == 'push' ||
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' && inputs.test_lane == 'full')
    timeout-minutes: 30
    runs-on: ubuntu-latest
    env:
      XCHECKER_E2E: "1"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ubuntu-cargo-stub-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ubuntu-cargo-stub-
            ubuntu-cargo-

      - name: Build claude-stub
        run: cargo build --bin claude-stub --features dev-tools

      - name: Add claude-stub to PATH as claude
        run: |
          # Create a symlink so tests can find 'claude' in PATH
          mkdir -p $HOME/.local/bin
          ln -sf $PWD/target/debug/claude-stub $HOME/.local/bin/claude
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Run stub integration tests
        run: |
          # Run serially to avoid race conditions from tests that use set_current_dir
          # Tests with #[ignore] that change CWD interfere when run in parallel
          # Use --features dev-tools so tests can find claude-stub via CARGO_BIN_EXE_claude_stub
          cargo test --features dev-tools --tests -- \
            --test-threads=1 \
            --include-ignored \
            --skip requires_real_claude \
            --skip requires_xchecker_binary \
            --skip requires_future_phase \
            --skip requires_future_api \
            --skip requires_refactoring \
            --skip windows_ci_only

  # ============================================================================
  # EXAMPLE VALIDATION: Validate showcase examples
  # ============================================================================
  example-validation:
    name: Example Validation (${{ matrix.os }})
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate fullstack-nextjs example (Unix)
        if: runner.os != 'Windows'
        run: |
          chmod +x examples/fullstack-nextjs/scripts/validate.sh
          ./examples/fullstack-nextjs/scripts/validate.sh

      - name: Validate fullstack-nextjs example (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          .\examples\fullstack-nextjs\scripts\validate.ps1

      - name: Validate mono-repo example (Unix)
        if: runner.os != 'Windows'
        run: |
          chmod +x examples/mono-repo/scripts/validate.sh
          ./examples/mono-repo/scripts/validate.sh

      - name: Validate mono-repo example (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          .\examples\mono-repo\scripts\validate.ps1

  # ============================================================================
  # WALKTHROUGH VALIDATION: Validate walkthrough code snippets
  # ============================================================================
  walkthrough-validation:
    name: Walkthrough Validation (${{ matrix.os }})
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate walkthrough snippets (Unix)
        if: runner.os != 'Windows'
        run: |
          chmod +x scripts/validate_walkthrough_snippets.sh
          ./scripts/validate_walkthrough_snippets.sh

      - name: Validate walkthrough snippets (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          .\scripts\validate_walkthrough_snippets.ps1

  # ============================================================================
  # SCHEMA VALIDATION: JSON schema compliance
  # ============================================================================
  schema-validation:
    name: Schema Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Run schema validation tests
        run: cargo test test_generated_outputs_validate_against_schemas

      - name: Run M3 gate contracts validation
        run: cargo test --test m3_gate_contracts_validation

      - name: Run comprehensive schema compliance tests
        run: cargo test --test test_schema_compliance

      - name: Verify schema examples validate
        run: cargo test --test test_json_schema_validation

  # ============================================================================
  # SECRET SCANNING: Secret detection tests
  # ============================================================================
  secret-scanning:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Run secret scanning tests with controls
        run: cargo test test_secret_scanning_ci_validation

      - name: Verify positive control fails scanner
        run: cargo test test_positive_control_fake_secrets_detected

      - name: Verify negative control passes scanner
        run: cargo test test_negative_control_clean_file_passes

      - name: Run redaction security tests
        run: cargo test --test test_redaction_security

  # ============================================================================
  # DOCS CONFORMANCE: Documentation validation
  # ============================================================================
  docs-conformance:
    name: Documentation Conformance
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Run documentation validation tests
        run: cargo test --test test_doc_validation -- --test-threads=1

      - name: Verify generated schema examples are fresh
        run: |
          git diff --exit-code docs/schemas/ || {
            echo "Generated schema examples are out of sync!"
            echo ""
            echo "Run 'cargo test --test test_doc_validation doc_validation::schema_examples_tests -- --nocapture' to regenerate and commit updated files under docs/schemas/*"
            echo ""
            exit 1
          }

  # ============================================================================
  # GATE VALIDATION: Gate command tests (cross-platform)
  # ============================================================================
  gate-validation:
    name: Gate Command Validation (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Run gate unit tests
        run: cargo test gate --lib

      - name: Run gate JSON schema validation
        run: cargo test --test test_json_schema_validation gate

  # ============================================================================
  # TEST-REAL: Real Claude API smoke tests (main branch only)
  # ============================================================================
  test-real:
    name: Test Real (With Claude)
    runs-on: ubuntu-latest
    # Only run on main branch pushes when the secret is available
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Run smoke tests
        run: cargo test --test smoke -- --ignored
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
